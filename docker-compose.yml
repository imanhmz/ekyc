version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: kyc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kyc_user
      POSTGRES_PASSWORD: kyc_pass
      POSTGRES_DB: kyc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migration/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    ports:
      - "5432:5432"
    networks:
      - kyc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc_user -d kyc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mq:
    image: rabbitmq:3.12-management-alpine
    container_name: kyc_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: kyc_mq
      RABBITMQ_DEFAULT_PASS: kyc_mq_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - kyc_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    container_name: kyc_ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - kyc_network

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: kyc_seaweedfs
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        sed "s/\$${S3_ACCESS_KEY}/$$S3_ACCESS_KEY/g; s/\$${S3_SECRET_KEY}/$$S3_SECRET_KEY/g"
        /etc/seaweedfs/s3.json > /tmp/s3.json &&
        exec weed server -s3 -filer -dir=/data -s3.port=8333 -s3.config=/tmp/s3.json
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    ports:
      - "8333:8333"   # S3 API
      - "9333:9333"   # Master UI
    volumes:
      - seaweedfs_data:/data
      - ./config/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
      - ./config/seaweedfs/security.toml:/etc/seaweedfs/security.toml:ro
    networks:
      - kyc_network

  s3browser:
    image: cloudlena/s3manager
    container_name: kyc_s3browser
    restart: unless-stopped
    environment:
      ENDPOINT: seaweedfs:8333
      ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      USE_SSL: "false"
    ports:
      - "9444:8080"
    depends_on:
      - seaweedfs
    networks:
      - kyc_network

